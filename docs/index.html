<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dorst — Design previews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0D0C09;
      color: #FAFAF5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main { max-width: 32rem; width: 100%; text-align: center; }
    h1 { font-size: 1.75rem; font-weight: 600; letter-spacing: 0.02em; margin-bottom: 0.5rem; }
    p { color: #706E66; font-size: 0.95rem; line-height: 1.5; margin-bottom: 2rem; }
    .choices { display: flex; flex-direction: column; gap: 0.75rem; }
    a {
      display: block;
      padding: 1rem 1.25rem;
      border: 1px solid #E8E5DC33;
      border-radius: 4px;
      color: inherit;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    a:hover { background: #FAFAF50a; border-color: #E8E5DC66; }
    a strong { display: block; font-weight: 600; margin-bottom: 0.25rem; }
    a span { font-size: 0.85rem; color: #706E66; }
  </style>
</head>
<body>
  <main>
    <h1>Dorst brewery</h1>
    <p>Two design directions for client review. Pick a version to open the full preview.</p>
    <div class="choices">
      <a href="./html-static/">
        <strong>Version A — Static HTML</strong>
        <span>Single-page concept (Fraunces / Outfit)</span>
      </a>
      <a href="./nextjs-app/">
        <strong>Version B — Next.js app</strong>
        <span>Multi-page site with shop, beers, locations</span>
      </a>
    </div>
  </main>
</body>
</html>
